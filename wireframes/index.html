<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Daber — Wireframes</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Frank+Ruhl+Libre:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
  :root{
    --paper: #F6F2E9;
    --paper-2: #EEE8DA;
    --ink: #1E1B16;
    --ink-2: #4A4436;
    --ink-3: #8A8273;
    --rule: #C9BFA8;
    --rule-2: #E3DAC4;
    --accent: oklch(0.62 0.12 40);  /* muted terracotta */
    --accent-2: oklch(0.82 0.05 40);
    --accent-soft: oklch(0.92 0.04 40);
  }
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif;}
  *{box-sizing:border-box}
  body{
    background-image:
      radial-gradient(rgba(30,27,22,0.06) 1px, transparent 1px);
    background-size: 22px 22px;
    background-position: 0 0;
  }
  .mono{font-family:'JetBrains Mono',monospace}
  .hand{font-family:'Caveat',cursive}
  .heb{font-family:'Frank Ruhl Libre',serif; direction:rtl;}
  a{color:inherit}
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script type="text/babel" src="src/primitives.jsx"></script>
