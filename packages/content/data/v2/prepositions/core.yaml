    gloss: after
    suffixes:
      1sg: אחריי
      2sg_m: אחריך
      2sg_f: אחרייך
      3sg_m: אחריו
      3sg_f: אחריה
      1pl: אחרינו
      2pl_m: אחריכם
      2pl_f: אחריכן
      3pl_m: אחריהם
      3pl_f: אחריהן
    suffixes_en:
      1sg: "after me"
      2sg_m: "after you (m)"
      2sg_f: "after you (f)"
      3sg_m: "after him"
      3sg_f: "after her"
      1pl: "after us"
      2pl_m: "after you (m pl)"
      2pl_f: "after you (f pl)"
      3pl_m: "after them (m)"
      3pl_f: "after them (f)"
    examples:
      - he: אחרי העבודה אני נח
        en: After work I rest.
      - he: הוא בא אחרי השיעור
        en: He comes after the lesson.
      - he: הכלב רץ אחריי.
        en: The dog runs after me.
      - he: אני אבוא אחריך.
        en: I will come after you.
      - he: הילדים הלכו אחריה.
        en: The children went after her.
      - he: אל תלכו אחריהם.
        en: Don't go after them.
      - he: המורה נכנסה אחרינו.
        en: The teacher came in after us.
      - he: אני עומד אחריכם בתור.
        en: I'm standing behind you in line.
      - he: תתקשרי אליי אחרי שתדברי איתו
        en: Call me after you👩‍🦰 talk to him
      - he: הוא יבוא אחרי שהוא יבוא
        en: He'll come after he will come
      - he: תתקשרי אליי אחרי שתסיימי
        en: Call 👩‍🦰me after you finish
