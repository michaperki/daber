id: cafe_ordering_1
title: Ordering at a Café
tagline: Get a drink and a bite, ask for the bill
estimated_minutes: 10
endpoint:
  description: A concrete café interaction from “hello” to paying the bill.
core:
  verbs:
    להזמין: [present_m_sg, present_f_sg]
  nouns:
    בית קפה: [sg]
    תפריט: [sg]
    חשבון: [sg]
    קפה: [sg]
    תה: [sg]
    מים: [pl]
    עוגה: [sg]
    כריך: [sg]
  adjectives:
    חם: [m_sg, f_sg]
    קר: [m_sg, f_sg, m_pl]
supporting:
  verbs:
    לשתות: [present_m_sg, present_f_sg]
    לאכול: [present_m_sg, present_f_sg]
    לשלם: [present_m_sg, present_f_sg]
    לרצות: [present_m_sg, present_f_sg]
  nouns:
    מלצר: [sg]
    חלב: [sg]
    סוכר: [sg]
    כוס: [sg, pl]
    שולחן: [sg]
build_phrases:
  - he: אפשר לקבל את התפריט
    en: can I get the menu
    pieces: [אפשר לקבל, את התפריט]
  - he: יש קפה בלי סוכר
    en: is there coffee without sugar
    pieces: [יש, קפה, בלי סוכר]
  - he: התה שלי עם חלב אבל בלי סוכר
    en: my tea has milk but no sugar
    pieces: [התה שלי, עם חלב, אבל בלי סוכר]
  - he: העוגה חמה והמים קרים
    en: the cake is hot and the water is cold
    pieces: [העוגה חמה, והמים קרים]
  - he: אני רוצה לשלם עכשיו אבל החשבון לא על השולחן
    en: I want to pay now but the bill is not on the table
    pieces: [אני רוצה לשלם עכשיו, אבל, החשבון לא על השולחן]
  - he: אפשר לקבל כוס מים עם הקפה
    en: can I get a glass of water with the coffee
    pieces: [אפשר לקבל, כוס מים, עם הקפה]
phases:
  - id: warmup
    title: Warm-up
    goal: Drinks, food, temperature, and useful cafe nouns.
  - id: order
    title: Order
    goal: Use request formulas, with/without phrases, and item descriptions.
  - id: pay
    title: Pay
    goal: Ask for תפריט/חשבון and finish the interaction naturally.
  - id: perform
    title: Performance
    goal: From ordering to paying smoothly.
wishlist:
  - Add female waiter noun (מלצרית) later for gender balance.
