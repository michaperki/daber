pos: noun
entries:
  - lemma: אי
    gloss: island
    forms:
      sg: אי
      pl: איים
    examples:
      - he: אנחנו מטיילים באי קטן
        en: We are traveling on a small island.
      - he: יש לי אי
        en: I have a island.
    gender: m
