<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0f1115" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>Daber</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Optional: load TFJS model for Hybrid (CNN + KNN). Safe if files missing. -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script>
      (async function() {
        try {
          if (window.tf) {
            try {
              window.daberCnnModel = await window.tf.loadLayersModel('/models/hebrew_letter_model_tuned/model.json');
              try {
                const labels = await fetch('/models/hebrew_letter_model_tuned/labels.json').then(r => r.json());
                if (Array.isArray(labels)) window.daberCnnLabels = labels;
              } catch {}
            } catch (e) {
              // Fallback path if tuned model not present
              try {
                window.daberCnnModel = await window.tf.loadLayersModel('/models/hebrew_letter_model/model.json');
              } catch {}
            }
          }
        } catch {}
      })();
    </script>
  </body>
</html>
