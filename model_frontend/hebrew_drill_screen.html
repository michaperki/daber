
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap');

  .drill-root {
    font-family: 'DM Sans', var(--font-sans), sans-serif;
    padding: 1.5rem 1rem 2rem;
    max-width: 420px;
    margin: 0 auto;
  }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }

  .exit-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 0.5px solid var(--color-border-secondary);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--color-text-secondary);
    font-size: 14px;
    flex-shrink: 0;
  }

  .progress-track {
    flex: 1;
    margin: 0 12px;
    height: 4px;
    background: var(--color-border-tertiary);
    border-radius: 99px;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    background: var(--color-text-primary);
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  .progress-label {
    font-size: 12px;
    color: var(--color-text-secondary);
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }

  .prompt-card {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-xl);
    padding: 1.75rem 1.5rem 1.5rem;
    margin-bottom: 1.25rem;
  }

  .prompt-eyebrow {
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--color-text-tertiary);
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  .prompt-text {
    font-family: 'DM Serif Display', var(--font-serif), serif;
    font-size: 22px;
    line-height: 1.35;
    color: var(--color-text-primary);
    margin-bottom: 1.25rem;
  }

  .transliteration {
    font-family: 'DM Mono', var(--font-mono), monospace;
    font-size: 12px;
    color: var(--color-text-tertiary);
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    user-select: none;
  }

  .hint-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    border: 1.5px solid var(--color-text-tertiary);
    flex-shrink: 0;
  }

  .hint-text {
    transition: opacity 0.2s;
  }

  .status-strip {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    height: 48px;
    margin-bottom: 1.25rem;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--color-text-tertiary);
    flex-shrink: 0;
  }

  .status-dot.active {
    background: var(--color-text-primary);
    animation: pulse 1.2s ease-in-out infinite;
  }

  .status-dot.error {
    background: #E24B4A;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.4); opacity: 0.6; }
  }

  .status-label {
    font-size: 13px;
    color: var(--color-text-secondary);
    letter-spacing: 0.02em;
  }

  .waveform {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 24px;
  }

  .wave-bar {
    width: 3px;
    background: var(--color-text-primary);
    border-radius: 99px;
    transform-origin: bottom;
    opacity: 0.3;
  }

  .wave-bar.active {
    opacity: 1;
    animation: wave 0.9s ease-in-out infinite;
  }

  .wave-bar:nth-child(1) { height: 8px; animation-delay: 0s; }
  .wave-bar:nth-child(2) { height: 16px; animation-delay: 0.1s; }
  .wave-bar:nth-child(3) { height: 20px; animation-delay: 0.2s; }
  .wave-bar:nth-child(4) { height: 12px; animation-delay: 0.3s; }
  .wave-bar:nth-child(5) { height: 18px; animation-delay: 0.15s; }
  .wave-bar:nth-child(6) { height: 24px; animation-delay: 0.05s; }
  .wave-bar:nth-child(7) { height: 14px; animation-delay: 0.25s; }

  @keyframes wave {
    0%, 100% { transform: scaleY(0.4); }
    50% { transform: scaleY(1); }
  }

  .mic-btn {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: var(--color-text-primary);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s ease, opacity 0.15s ease;
    flex-shrink: 0;
  }

  .mic-btn:active { transform: scale(0.93); }

  .mic-btn.recording {
    background: #E24B4A;
  }

  .mic-btn svg {
    width: 26px;
    height: 26px;
  }

  .mic-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 1.5rem;
  }

  .side-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 0.5px solid var(--color-border-secondary);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--color-text-secondary);
  }

  .side-btn svg {
    width: 16px;
    height: 16px;
  }

  .transcript-preview {
    font-family: 'DM Mono', var(--font-mono), monospace;
    font-size: 13px;
    color: var(--color-text-secondary);
    text-align: center;
    min-height: 20px;
    transition: opacity 0.3s;
    margin-bottom: 1.25rem;
    letter-spacing: 0.01em;
  }

  .feedback-card {
    border-radius: var(--border-radius-xl);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.25rem;
    border: 0.5px solid transparent;
    transition: all 0.3s ease;
  }

  .feedback-card.correct {
    background: #EAF3DE;
    border-color: #97C459;
  }

  .feedback-card.flawed {
    background: #FAEEDA;
    border-color: #EF9F27;
  }

  .feedback-card.incorrect {
    background: #FCEBEB;
    border-color: #F09595;
  }

  .feedback-card.hidden {
    opacity: 0;
    pointer-events: none;
    height: 0;
    padding: 0;
    margin: 0;
    overflow: hidden;
  }

  .feedback-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .feedback-badge {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 99px;
  }

  .feedback-badge.correct { background: #C0DD97; color: #3B6D11; }
  .feedback-badge.flawed { background: #FAC775; color: #854F0B; }
  .feedback-badge.incorrect { background: #F7C1C1; color: #A32D2D; }

  .feedback-reason {
    font-size: 12px;
    color: var(--color-text-secondary);
  }

  .correct-hebrew {
    font-family: 'DM Serif Display', var(--font-serif), serif;
    font-size: 28px;
    direction: rtl;
    color: var(--color-text-primary);
    margin-bottom: 6px;
  }

  .correct-transliteration {
    font-family: 'DM Mono', var(--font-mono), monospace;
    font-size: 12px;
    color: var(--color-text-secondary);
  }

  .next-btn {
    width: 100%;
    height: 52px;
    border-radius: var(--border-radius-lg);
    background: var(--color-text-primary);
    color: var(--color-background-primary);
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', var(--font-sans), sans-serif;
    font-size: 15px;
    font-weight: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: opacity 0.15s;
    margin-bottom: 1rem;
  }

  .next-btn:active { opacity: 0.8; }

  .next-btn.hidden { display: none; }

  .state-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .state-tab {
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 99px;
    border: 0.5px solid var(--color-border-secondary);
    background: transparent;
    cursor: pointer;
    color: var(--color-text-secondary);
    transition: all 0.15s;
    font-family: 'DM Mono', var(--font-mono), monospace;
  }

  .state-tab.active {
    background: var(--color-text-primary);
    color: var(--color-background-primary);
    border-color: var(--color-text-primary);
  }

  .divider {
    height: 0.5px;
    background: var(--color-border-tertiary);
    margin: 1rem 0;
  }

  .switcher-label {
    font-size: 11px;
    color: var(--color-text-tertiary);
    text-align: center;
    margin-bottom: 0.75rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
</style>

<div class="drill-root">

  <div class="switcher-label">preview state</div>
  <div class="state-tabs">
    <button class="state-tab active" onclick="setDrillState('listening')">listening</button>
    <button class="state-tab" onclick="setDrillState('recording')">recording</button>
    <button class="state-tab" onclick="setDrillState('correct')">correct</button>
    <button class="state-tab" onclick="setDrillState('flawed')">flawed</button>
    <button class="state-tab" onclick="setDrillState('incorrect')">incorrect</button>
  </div>

  <div class="top-bar">
    <button class="exit-btn">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M10 3L5 8l5 5"/>
      </svg>
    </button>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width: 40%"></div>
    </div>
    <span class="progress-label" id="progress-label">4 / 10</span>
  </div>

  <div class="prompt-card">
    <div class="prompt-eyebrow">present tense basics</div>
    <div class="prompt-text" id="prompt-text">How do I say: she is improving?</div>
    <div class="transliteration" id="hint-row" onclick="toggleHint()">
      <div class="hint-dot" id="hint-dot"></div>
      <span class="hint-text" id="hint-text">show hint</span>
    </div>
  </div>

  <div class="status-strip" id="status-strip">
    <div class="status-dot active" id="status-dot"></div>
    <span class="status-label" id="status-label">listening…</span>
    <div class="waveform" id="waveform">
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
    </div>
  </div>

  <div class="mic-row" id="mic-row">
    <button class="side-btn" title="replay prompt">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M2 8a6 6 0 1 0 6-6" stroke-linecap="round"/>
        <path d="M2 4v4h4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button class="mic-btn" id="mic-btn" onclick="toggleRecording()">
      <svg viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="9" y="2" width="8" height="14" rx="4" fill="white"/>
        <path d="M5 12a8 8 0 0 0 16 0" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="13" y1="20" x2="13" y2="24" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </button>
    <button class="side-btn" title="skip">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M3 4l7 4-7 4V4zM12 4v8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <div class="transcript-preview" id="transcript-preview"></div>

  <div class="feedback-card hidden" id="feedback-card">
    <div class="feedback-top">
      <span class="feedback-badge" id="feedback-badge">correct</span>
      <span class="feedback-reason" id="feedback-reason"></span>
    </div>
    <div class="correct-hebrew" id="correct-hebrew">היא משתפרת</div>
    <div class="correct-transliteration" id="correct-trans">hi mishtaperet</div>
  </div>

  <button class="next-btn hidden" id="next-btn" onclick="nextItem()">
    next prompt
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M3 7h8M7 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

</div>

<script>
let currentState = 'listening';
let hintVisible = false;
let isRecording = false;

const states = {
  listening: {
    dotClass: '',
    dotActive: true,
    label: 'listening…',
    waveActive: false,
    micRecording: false,
    transcriptText: '',
    feedback: null,
    showNext: false,
  },
  recording: {
    dotClass: '',
    dotActive: true,
    label: 'recording',
    waveActive: true,
    micRecording: true,
    transcriptText: '',
    feedback: null,
    showNext: false,
  },
  correct: {
    dotClass: '',
    dotActive: false,
    label: 'correct',
    waveActive: false,
    micRecording: false,
    transcriptText: 'hi mishtaperet',
    feedback: {
      type: 'correct',
      badge: 'correct',
      reason: 'exact match',
      hebrew: 'היא משתפרת',
      trans: 'hi mishtaperet',
    },
    showNext: true,
  },
  flawed: {
    dotClass: '',
    dotActive: false,
    label: 'close',
    waveActive: false,
    micRecording: false,
    transcriptText: 'hu mishtaper',
    feedback: {
      type: 'flawed',
      badge: 'close',
      reason: 'wrong gender',
      hebrew: 'היא משתפרת',
      trans: 'hi mishtaperet',
    },
    showNext: true,
  },
  incorrect: {
    dotClass: 'error',
    dotActive: false,
    label: 'not quite',
    waveActive: false,
    micRecording: false,
    transcriptText: 'ani kotev',
    feedback: {
      type: 'incorrect',
      badge: 'not quite',
      reason: 'wrong verb',
      hebrew: 'היא משתפרת',
      trans: 'hi mishtaperet',
    },
    showNext: true,
  },
};

function setDrillState(state) {
  currentState = state;
  const s = states[state];

  document.querySelectorAll('.state-tab').forEach(t => {
    t.classList.toggle('active', t.textContent === state);
  });

  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot';
  if (s.dotActive) dot.classList.add('active');
  if (s.dotClass) dot.classList.add(s.dotClass);

  document.getElementById('status-label').textContent = s.label;

  const bars = document.querySelectorAll('.wave-bar');
  bars.forEach(b => b.classList.toggle('active', s.waveActive));

  const micBtn = document.getElementById('mic-btn');
  micBtn.classList.toggle('recording', s.micRecording);

  document.getElementById('transcript-preview').textContent = s.transcriptText;

  const fb = document.getElementById('feedback-card');
  const badge = document.getElementById('feedback-badge');
  const reason = document.getElementById('feedback-reason');
  const hebrew = document.getElementById('correct-hebrew');
  const trans = document.getElementById('correct-trans');

  if (s.feedback) {
    fb.className = 'feedback-card ' + s.feedback.type;
    badge.className = 'feedback-badge ' + s.feedback.type;
    badge.textContent = s.feedback.badge;
    reason.textContent = s.feedback.reason;
    hebrew.textContent = s.feedback.hebrew;
    trans.textContent = s.feedback.trans;
  } else {
    fb.className = 'feedback-card hidden';
  }

  const nextBtn = document.getElementById('next-btn');
  nextBtn.classList.toggle('hidden', !s.showNext);
}

function toggleRecording() {
  if (currentState === 'listening') {
    setDrillState('recording');
    document.querySelector('[onclick="setDrillState(\'recording\')"]').classList.add('active');
    document.querySelector('[onclick="setDrillState(\'listening\')"]').classList.remove('active');
  } else if (currentState === 'recording') {
    setDrillState('flawed');
    document.querySelectorAll('.state-tab').forEach(t => {
      t.classList.toggle('active', t.textContent === 'flawed');
    });
  }
}

function toggleHint() {
  hintVisible = !hintVisible;
  const hintText = document.getElementById('hint-text');
  const hintDot = document.getElementById('hint-dot');
  hintText.textContent = hintVisible ? 'hi mishtaperet' : 'show hint';
  hintDot.style.background = hintVisible ? 'var(--color-text-tertiary)' : 'transparent';
}

function nextItem() {
  setDrillState('listening');
  document.querySelectorAll('.state-tab').forEach(t => {
    t.classList.toggle('active', t.textContent === 'listening');
  });
  hintVisible = false;
  document.getElementById('hint-text').textContent = 'show hint';
  const fill = document.getElementById('progress-fill');
  const label = document.getElementById('progress-label');
  const cur = parseInt(fill.style.width) + 10;
  fill.style.width = Math.min(cur, 100) + '%';
  const n = Math.min(parseInt(label.textContent) + 1, 10);
  label.textContent = n + ' / 10';
}
</script>
