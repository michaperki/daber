id: running_late_morning_1
title: Running Late in the Morning
tagline: Wake up late, scramble, and get moving
estimated_minutes: 9
endpoint:
  description: A short first-person mini-story about waking late and hurrying to the bus/work.
core:
  verbs:
    להתעורר: [present_m_sg, present_f_sg]
  adjectives:
    עייף: [m_sg, f_sg]
    עמוס: [m_sg, f_sg]
  nouns:
    בוקר: [sg]
    אוטובוס: [sg]
    עבודה: [sg]
supporting:
  verbs:
    לאחר: [present_m_sg, present_f_sg]
    ללכת: [present_m_sg, present_f_sg]
    לצאת: [present_m_sg, present_f_sg]
    לקח: [present_m_sg, present_f_sg]
  nouns:
    קפה: [sg]
    טלפון: [sg]
    זמן: [sg]
    בית: [sg]
build_phrases:
  - he: הבוקר אני עייף אבל אני יוצא לעבודה
    en: this morning I am tired but I am going out to work
    pieces: [הבוקר, אני עייף, אבל אני יוצא לעבודה]
  - he: האוטובוס כבר בתחנה ואני עדיין בבית
    en: the bus is already at the station and I am still at home
    pieces: [האוטובוס כבר בתחנה, ואני עדיין בבית]
  - he: אין לי זמן לקפה
    en: I do not have time for coffee
    pieces: [אין לי זמן, לקפה]
  - he: אני לוקח את הטלפון לפני שאני יוצא
    en: I am taking the phone before I leave
    pieces: [אני לוקח, את הטלפון, לפני שאני יוצא]
  - he: עכשיו הוא רץ לאוטובוס כי הוא מאחר
    en: now he is running to the bus because he is late
    pieces: [עכשיו, הוא רץ לאוטובוס, כי הוא מאחר]
  - he: היום אני הולך לעבודה ברגל לא באוטובוס
    en: today I am going to work on foot not by bus
    pieces: [היום, אני הולך לעבודה ברגל, לא באוטובוס]
phases:
  - id: warmup
    title: Warm-up
    goal: Morning nouns, tired/busy adjectives, and useful time cues.
  - id: scramble
    title: Scramble
    goal: Combine כבר, עכשיו, בלי, את, and short connected clauses.
  - id: perform
    title: Performance
    goal: Tell the short “late morning” micro-story.
wishlist:
  - Add clock-time nouns (שעה/דקה) in a follow-up lesson.
