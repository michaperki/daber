id: making_plans_1
title: Making Plans
tagline: Suggest a time and place and agree to meet
estimated_minutes: 8
endpoint:
  description: A short exchange proposing to meet and agreeing on when and where.
core:
  verbs:
    להיפגש: [future_1pl]
  adjectives:
    קשה: [m_sg, f_sg]
  nouns:
    בוקר: [sg]
    ערב: [sg]
    תחנה: [sg]
    פארק: [sg]
supporting:
  verbs:
    לחכות: [present_m_sg, present_f_sg]
  nouns:
    שבוע: [sg]
    יום: [sg]
    עבודה: [sg]
    בית קפה: [sg]
    טלפון: [sg]
build_phrases:
  - he: מחר ניפגש ליד התחנה
    en: tomorrow we will meet near the station
    pieces: [מחר, ניפגש, ליד התחנה]
  - he: כל בוקר הוא בא לפארק
    en: every morning he comes to the park
    pieces: [כל בוקר, הוא בא, לפארק]
  - he: כל ערב היא באה לתחנה
    en: every evening she comes to the station
    pieces: [כל ערב, היא באה, לתחנה]
  - he: אני כבר מחכה ליד התחנה
    en: I am already waiting near the station
    pieces: [אני כבר מחכה, ליד התחנה]
  - he: אחרי העבודה ניפגש בבית קפה
    en: after work we will meet at a cafe
    pieces: [אחרי העבודה, ניפגש, בבית קפה]
  - he: בלי טלפון קשה להיפגש
    en: without a phone it is hard to meet
    pieces: [בלי טלפון, קשה, להיפגש]
phases:
  - id: warmup
    title: Warm-up
    goal: Review time/place words, קשה, and planning nouns.
  - id: propose
    title: Propose & confirm
    goal: Use ניפגש with time, place, and after/without phrases.
  - id: perform
    title: Performance
    goal: Deliver a short plan agreement (when and where).
wishlist:
  - Optional future expansion with weekday names and clock times.
