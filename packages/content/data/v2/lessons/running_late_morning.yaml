id: running_late_morning_1
title: Running Late in the Morning
tagline: Wake up late, scramble, and get moving
estimated_minutes: 9
endpoint:
  description: A short first-person mini-story about waking late and hurrying to the bus/work.
core:
  verbs:
    להתעורר: [present_m_sg, present_f_sg]
  adjectives:
    עייף: [m_sg, f_sg]
    עמוס: [m_sg, f_sg]
  nouns:
    בוקר: [sg]
    אוטובוס: [sg]
    עבודה: [sg]
supporting:
  verbs:
    לאחר: [present_m_sg, present_f_sg]
    ללכת: [present_m_sg, present_f_sg]
    לצאת: [present_m_sg, present_f_sg]
    לקח: [present_m_sg, present_f_sg]
  nouns:
    קפה: [sg]
    טלפון: [sg]
build_phrases:
  - he: הבוקר אני עייף אבל יוצא
    en: this morning I am tired but I leave
    pieces: [הבוקר, אני עייף, אבל יוצא]
  - he: האוטובוס כבר בתחנה
    en: the bus is already at the station
    pieces: [האוטובוס, כבר בתחנה]
  - he: עכשיו הוא רץ לאוטובוס
    en: now he is running to the bus
    pieces: [עכשיו, הוא רץ, לאוטובוס]
  - he: אני לוקח את הטלפון ורץ
    en: I take the phone and run
    pieces: [אני לוקח, את הטלפון, ורץ]
  - he: בלי קפה הבוקר קשה
    en: without coffee the morning is hard
    pieces: [בלי קפה, הבוקר קשה]
  - he: היום אני הולך לעבודה בלי אוטובוס
    en: today I am going to work without a bus
    pieces: [היום, אני הולך לעבודה, בלי אוטובוס]
phases:
  - id: warmup
    title: Warm-up
    goal: Morning nouns, tired/busy adjectives, and useful time cues.
  - id: scramble
    title: Scramble
    goal: Combine כבר, עכשיו, בלי, את, and short connected clauses.
  - id: perform
    title: Performance
    goal: Tell the short “late morning” micro-story.
wishlist:
  - Add clock-time nouns (שעה/דקה) in a follow-up lesson.
