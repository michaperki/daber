id: cafe_ordering_1
title: Ordering at a Café
tagline: Get a drink and a bite, ask for the bill
estimated_minutes: 10
endpoint:
  description: A concrete café interaction from “hello” to paying the bill.
core:
  verbs:
    להזמין: [present_m_sg, present_f_sg]
  nouns:
    בית קפה: [sg]
    תפריט: [sg]
    חשבון: [sg]
    קפה: [sg]
    תה: [sg]
    מים: [pl]
    עוגה: [sg]
    כריך: [sg]
  adjectives:
    חם: [m_sg, f_sg]
    קר: [m_sg, f_sg]
supporting:
  verbs:
    לשתות: [present_m_sg, present_f_sg]
    לאכול: [present_m_sg, present_f_sg]
    לשלם: [present_m_sg, present_f_sg]
    לרצות: [present_m_sg, present_f_sg]
  nouns:
    מלצר: [sg]
    חלב: [sg]
    סוכר: [sg]
    כוס: [sg, pl]
    שולחן: [sg]
build_phrases:
  - he: אפשר לקבל תפריט
    en: can I get a menu
    pieces: [אפשר לקבל, תפריט]
  - he: אני רוצה קפה בלי סוכר
    en: I want coffee without sugar
    pieces: [אני רוצה, קפה, בלי סוכר]
  - he: התה עם חלב בלי סוכר
    en: tea with milk, no sugar
    pieces: [התה, עם חלב, בלי סוכר]
  - he: הכריך קר והעוגה חמה
    en: the sandwich is cold and the cake is hot
    pieces: [הכריך קר, והעוגה חמה]
  - he: אפשר לשלם עכשיו
    en: can I pay now
    pieces: [אפשר לשלם, עכשיו]
  - he: החשבון על השולחן
    en: the bill is on the table
    pieces: [החשבון, על השולחן]
phases:
  - id: warmup
    title: Warm-up
    goal: Drinks, food, temperature, and useful cafe nouns.
  - id: order
    title: Order
    goal: Use request formulas, with/without phrases, and item descriptions.
  - id: pay
    title: Pay
    goal: Ask for תפריט/חשבון and finish the interaction naturally.
  - id: perform
    title: Performance
    goal: From ordering to paying smoothly.
wishlist:
  - Add female waiter noun (מלצרית) later for gender balance.
