pos: noun
entries:
  - lemma: כרטיס
    gloss: ticket, card
    forms:
      sg: כרטיס
      pl: כרטיסים
    examples:
      - he: יש לך כרטיס?
        en: Do you have a ticket?
      - he: אני צריך כרטיס לרכבת
        en: I need a ticket for the train.
    gender: m
  - lemma: בקבוק
    gloss: bottle
    forms:
      sg: בקבוק
      pl: בקבוקים
    examples:
      - he: יש בקבוק על השולחן
        en: There is a bottle on the table.
      - he: אני רואה את הבקבוק
        en: I see the bottle.
    gender: m
  - lemma: ילד
    gloss: boy
    forms:
      sg: ילד
      pl: ילדים
    examples:
      - he: הילד משחק בפארק
        en: The boy is playing in the park.
      - he: יש לי שני ילדים
