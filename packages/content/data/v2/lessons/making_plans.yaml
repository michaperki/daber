id: making_plans_1
title: Making Plans
tagline: Suggest a time and place and agree to meet
estimated_minutes: 8
endpoint:
  description: A short exchange proposing to meet and agreeing on when and where.
core:
  verbs:
    להיפגש: [future_1pl]
  nouns:
    בוקר: [sg]
    ערב: [sg]
    תחנה: [sg]
    פארק: [sg]
supporting:
  verbs:
    לחכות: [present_m_sg, present_f_sg]
  nouns:
    שבוע: [sg]
    יום: [sg]
build_phrases:
  - he: אנחנו נפגש בפארק
    en: we will meet in the park
    pieces: [אנחנו נפגש, בפארק]
  - he: כל בוקר הוא בא לפארק
    en: every morning he comes to the park
    pieces: [כל בוקר, הוא בא, לפארק]
  - he: כל ערב היא באה לתחנה
    en: every evening she comes to the station
    pieces: [כל ערב, היא באה, לתחנה]
  - he: הוא מחכה בתחנה
    en: he waits at the station
    pieces: [הוא מחכה, בתחנה]
  - he: היא מחכה בפארק
    en: she waits in the park
    pieces: [היא מחכה, בפארק]
  - he: אנחנו נפגש השבוע
    en: we will meet this week
    pieces: [אנחנו נפגש, השבוע]
phases:
  - id: warmup
    title: Warm-up
    goal: Review clear time/place phrases for לבוא and time words.
  - id: propose
    title: Propose & confirm
    goal: Use ניפגש + time/place to make a plan.
  - id: perform
    title: Performance
    goal: Deliver a short plan agreement (when and where).
wishlist:
  - Optional future expansion with weekday names and clock times.
