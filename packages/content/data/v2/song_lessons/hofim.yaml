        en: "I miss home."
    flexibility_forms: [אני מתגעגע, היא מתגעגעת, הם מתגעגעים, התגעגעתי, געגוע, געגועים]
    grammar_pattern: "verb plus ל complement; noun געגוע can carry the same complement"
    governance:
      marker: ל
      frame_he: להתגעגע ל___
    lyric_unlocks:
