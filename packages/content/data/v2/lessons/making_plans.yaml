id: making_plans_1
title: Making Plans
tagline: Suggest a time and place and agree to meet
estimated_minutes: 8
endpoint:
  description: A short exchange proposing to meet and agreeing on when and where.
core:
  verbs:
    להיפגש: [future_1pl]
  adjectives:
    קשה: [m_sg, f_sg]
  nouns:
    בוקר: [sg]
    ערב: [sg]
    תחנה: [sg]
    פארק: [sg]
supporting:
  verbs:
    לחכות: [present_m_sg, present_f_sg]
  nouns:
    שבוע: [sg]
    יום: [sg]
    זמן: [sg]
    עבודה: [sg]
    בית קפה: [sg]
    טלפון: [sg]
build_phrases:
  - he: מחר בבוקר ניפגש ליד התחנה
    en: tomorrow morning we will meet near the station
    pieces: [מחר בבוקר, ניפגש, ליד התחנה]
  - he: יש לך זמן בערב
    en: do you have time in the evening
    pieces: [יש לך זמן, בערב]
  - he: קשה להיפגש בלי טלפון
    en: it is hard to meet without a phone
    pieces: [קשה, להיפגש, בלי טלפון]
  - he: אני לא מחכה בתחנה אני מחכה בבית קפה
    en: I am not waiting at the station I am waiting at a cafe
    pieces: [אני לא מחכה בתחנה, אני מחכה בבית קפה]
  - he: אחרי העבודה ניפגש בפארק לא בתחנה
    en: after work we will meet in the park not at the station
    pieces: [אחרי העבודה, ניפגש בפארק, לא בתחנה]
  - he: כל ערב היא באה לתחנה אבל היום היא בפארק
    en: every evening she comes to the station but today she is in the park
    pieces: [כל ערב, היא באה לתחנה, אבל היום היא בפארק]
phases:
  - id: warmup
    title: Warm-up
    goal: Review time/place words, קשה, and planning nouns.
  - id: propose
    title: Propose & confirm
    goal: Use ניפגש with time, place, and after/without phrases.
  - id: perform
    title: Performance
    goal: Deliver a short plan agreement (when and where).
wishlist:
  - Optional future expansion with weekday names and clock times.
